---
on:
  push:
    branches: [master]
  pull_request:
name: test

jobs:
  Format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  Build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup
      - run: pnpm build

  Vitest:
    name: Vitest (${{ matrix.timezone }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        timezone: [UTC, Asia/Shanghai, America/New_York]
    env:
      TZ: ${{ matrix.timezone }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: ./.github/actions/setup

      - name: Generate holiday data
        run: pnpm build:data

      - name: Run tests with coverage
        run: pnpm run test --run --coverage

      - name: Upload coverage
        if: matrix.timezone == 'UTC'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
